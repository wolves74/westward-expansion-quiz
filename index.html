<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manifest Destiny Quiz</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
}

.page {
  display: none;
  width: 100%;
  min-height: 100vh;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  padding: 30px 0;
}

#page1 {
  display: block;
  background-image: url("WWE3.JPG");
}

#page2 {
  background-image: url("WWE1.PNG");
}

#page3 {
  background-image: url("WWE2.PNG");
}

.box {
  width: 60%;
  margin: 60px auto;
  background: rgba(255,255,255,0.88);
  padding: 30px;
  border-radius: 15px;
}

.question {
  margin-bottom: 20px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #8d6e4f;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #6f543c;
}

#result {
  margin-top: 20px;
  font-size: 20px;
  text-align: center;
}

.review-item {
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="page1" class="page">
  <div class="box" style="text-align:center;">
    <h1>Manifest Destiny Quiz</h1>
    <p>20 Questions • Randomized Each Time</p>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>
</div>

<div id="page2" class="page">
  <div class="box" id="questions1"></div>
  <div class="box" style="text-align:center;">
    <button onclick="goToPage(3)">Next</button>
  </div>
</div>

<div id="page3" class="page">
  <div class="box" id="questions2"></div>
  <div class="box" style="text-align:center;">
    <button onclick="showResults()">Submit</button>
    <button onclick="startQuiz()">Try Again</button>
    <div id="result"></div>
    <div id="review"></div>
  </div>
</div>

<script>

const questionBank = [
["Manifest Destiny was the belief the U.S. should expand west.", true],
["The Oregon Trail was used by settlers.", true],
["The Gold Rush caused people to move west.", true],
["Settlers traveled by airplane.", false],
["Expansion led to conflict with Native Americans.", true],
["The U.S. gained land after the Mexican-American War.", true],
["Expansion had no impact on Native Americans.", false],
["Railroads helped people move west.", true],
["The Homestead Act gave land to settlers.", true],
["Florida was gained from Spain.", true],
["Covered wagons were used by settlers.", true],
["Expansion created new states.", true],
["Native Americans willingly gave up land.", false],
["Gold was discovered in California in 1848.", true],
["Expansion helped reach the Pacific Ocean.", true],
["The U.S. lost land after the Mexican-American War.", false],
["Expansion caused debates over slavery.", true],
["People moved west for land and opportunity.", true],
["The Louisiana Purchase doubled U.S. size.", true],
["Manifest Destiny supported expansion.", true]
];

let activeQuestions = [];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  activeQuestions = shuffle([...questionBank]);
  document.getElementById("result").innerHTML = "";
  document.getElementById("review").innerHTML = "";

  renderQuestions();
  goToPage(2);
}

function renderQuestions() {
  let q1 = "";
  let q2 = "";

  activeQuestions.forEach((q, i) => {
    let choices = shuffle([
      ["True", true],
      ["False", false]
    ]);

    let html = `
      <div class="question">
        <p><b>${i+1}.</b> ${q[0]}</p>
        <label><input type="radio" name="q${i}" value="${choices[0][1]}"> ${choices[0][0]}</label><br>
        <label><input type="radio" name="q${i}" value="${choices[1][1]}"> ${choices[1][0]}</label>
      </div>
    `;

    if (i < 10) q1 += html;
    else q2 += html;
  });

  document.getElementById("questions1").innerHTML = q1;
  document.getElementById("questions2").innerHTML = q2;
}

function goToPage(n) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById("page"+n).style.display = "block";
  window.scrollTo(0,0);
}

function showResults() {
  let score = 0;
  let review = "";

  activeQuestions.forEach((q, i) => {
    let selected = document.querySelector(`input[name="q${i}"]:checked`);

    if (selected && selected.value === "true") {
      score++;
    } else {
      review += `
        <div class="review-item">
          <b>Question ${i+1}:</b> ${q[0]}<br>
          <b>Correct Answer:</b> ${q[1] ? "True" : "False"}
        </div>
      `;
    }
  });

  let message = "";
  if (score >= 18) message = "Excellent work!";
  else if (score >= 14) message = "Nice job!";
  else if (score >= 10) message = "You're getting there.";
  else message = "Keep practicing.";

  document.getElementById("result").innerHTML =
    `<h2>Your Score: ${score}/20</h2><p>${message}</p>`;

  document.getElementById("review").innerHTML = review;
}

</script>

</body>
</html>
