<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f6f3ee;
}

.page { display:none; width:100%; min-height:100vh; }
#page1 { display:block; position:relative; }

.cover { width:100%; display:block; }

.start-btn {
  position:absolute;
  bottom:6%;
  right:10%;
  width:320px;
  height:90px;
  background:transparent;
  border:none;
  cursor:pointer;
}

.box {
  width:90%;
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-sizing:border-box;
}

h2 {
  text-align:center;
  margin-top:10px;
}

.question {
  margin-bottom:24px;
  padding-bottom:18px;
  border-bottom:1px solid #e6e0d7;
}

.question:last-child {
  border-bottom:none;
}

.question p {
  font-size:19px;
  line-height:1.5;
  margin:0 0 10px 0;
  font-weight:bold;
}

label {
  display:block;
  margin:7px 0;
  cursor:pointer;
  line-height:1.45;
  font-size:17px;
}

.match {
  margin-bottom:18px;
}

.match label {
  font-weight:bold;
  margin-bottom:6px;
}

.match select {
  padding:10px;
  width:100%;
  max-width:520px;
  font-size:16px;
  font-family:Georgia, serif;
  border-radius:8px;
  border:1px solid #cfc7bc;
}

button {
  padding:12px 20px;
  background:#8d6e4f;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:10px;
  font-size:16px;
}

.button-row { text-align:center; }

.student-name {
  text-align:center;
  margin-bottom:25px;
}

.student-name input {
  padding:10px;
  width:260px;
  font-size:16px;
  border:1px solid #cfc7bc;
  border-radius:8px;
  font-family:Georgia, serif;
}

#results {
  margin-top:25px;
  font-size:18px;
}

.review-item {
  margin-top:12px;
  padding:12px;
  background:#f5f1eb;
  border-radius:10px;
}

@media print {
  body * { visibility:hidden; }
  #printArea, #printArea * { visibility:visible; }
  #printArea {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    background:white;
    padding:30px;
    box-sizing:border-box;
  }
}
</style>
</head>

<body>

<div id="page1" class="page">
  <img src="cover.JPG" class="cover" alt="Manifest Destiny Quiz Cover">
  <button class="start-btn" onclick="startQuiz()" aria-label="Begin Quiz"></button>
</div>

<div id="page2" class="page">
  <div class="box">

    <div class="student-name">
      <p><strong>Student Name</strong></p>
      <input id="name" placeholder="Enter your name">
    </div>

    <h2>Part 1: Vocabulary</h2>
    <div id="vocab"></div>

    <h2>Part 2: Multiple Choice</h2>
    <div id="quiz"></div>

    <div class="button-row">
      <button onclick="submitQuiz()">Submit</button>
      <button onclick="location.reload()">Try Again</button>
      <button onclick="window.print()">Print</button>
    </div>

    <div id="results"></div>

    <div id="printArea">
      <h2>Manifest Destiny Assessment</h2>
      <p><strong>Name:</strong> <span id="printName"></span></p>
      <p><strong>Score:</strong> <span id="printScore"></span></p>
    </div>

  </div>
</div>

<script>
let vocab = [
  {word:"Manifest Destiny", def:"the belief that the United States should expand westward across North America"},
  {word:"Oregon Trail", def:"a route many settlers used as they traveled west"},
  {word:"Gold Rush", def:"a period when many people moved west to search for gold"},
  {word:"Homestead Act", def:"a law that gave land to settlers who agreed to live on and farm it"},
  {word:"Pioneer", def:"a person who moves to a new area to settle there"}
];

let questions = [
  ["Which statement best explains the idea of Manifest Destiny?", ["It was the belief that the United States should expand westward.", "It was a law that ended westward travel.", "It was a military plan created by Mexico.", "It was a trade route to Europe."], 0],
  ["Why did many Americans choose to move west during the 1800s?", ["They wanted land, jobs, and new opportunities.", "They were ordered by the government to leave the East.", "They wanted to avoid using railroads.", "They believed cities in the East were illegal."], 0],
  ["What was one important result of the Louisiana Purchase?", ["It reduced the size of the United States.", "It gave the United States a large amount of new land.", "It ended all conflict with Native Americans.", "It created the Oregon Trail."], 1],
  ["Why was the Oregon Trail important to westward expansion?", ["It was one of the main routes settlers used to travel west.", "It was the first railroad line built in America.", "It was used only by soldiers during wartime.", "It connected the United States to Europe."], 0],
  ["How did the California Gold Rush affect westward expansion?", ["It caused many people to head west in search of wealth.", "It made settlers return to the East Coast.", "It ended the building of railroads.", "It stopped people from moving to California."], 0],
  ["Which method of travel was most closely connected to early settlers moving west?", ["Covered wagons", "Airplanes", "Subways", "Automobiles"], 0],
  ["How did westward expansion affect many Native American groups?", ["It often forced them off their land and led to conflict.", "It gave them more control over western land.", "It had almost no effect on them.", "It moved them into large eastern cities."], 0],
  ["What happened after the Mexican-American War ended?", ["The United States gained additional western territory.", "Mexico gained control of California.", "The Oregon Trail was closed forever.", "The United States lost land in the Southwest."], 0],
  ["Why were railroads important to westward expansion?", ["They made travel and shipping faster across long distances.", "They stopped settlers from moving west.", "They were used only in the South.", "They replaced the need for towns and farms."], 0],
  ["What was the purpose of the Homestead Act?", ["To give settlers land if they agreed to live on and farm it", "To tax farmers who moved west", "To close western territories to settlement", "To return land to Spain"], 0],
  ["Which statement best describes a pioneer?", ["A person who settled in a new area", "A person who fought in the Civil War", "A person who worked only in factories", "A person who served as president"], 0],
  ["Why did the United States want to reach the Pacific Ocean?", ["Leaders believed the nation should stretch from coast to coast.", "The Pacific Ocean was the only place where crops could grow.", "It was required by the Constitution.", "Most settlers wanted to move back east after arriving there."], 0],
  ["What was one danger settlers faced while traveling west?", ["Disease and harsh weather", "Too many paved roads", "Lack of land to settle", "Modern traffic"], 0],
  ["Why did westward expansion create arguments about slavery?", ["People disagreed about whether slavery would be allowed in new territories.", "The West had already banned farming.", "Railroads refused to carry enslaved people.", "Native Americans voted on slavery in Congress."], 0],
  ["Which statement about Manifest Destiny is most accurate?", ["Many Americans used it to justify moving west and taking more land.", "It was a belief that the nation should remain small.", "It referred only to trade with Mexico.", "It was created after the Civil War."], 0],
  ["What was one reason land in the West appealed to settlers?", ["It gave families the chance to farm and build a new life.", "It was already fully developed with large cities.", "It allowed people to avoid all hard work.", "It guaranteed everyone would find gold."], 0],
  ["Which event encouraged thousands of people to move to California?", ["The Gold Rush", "The Louisiana Purchase", "The War of 1812", "The Boston Tea Party"], 0],
  ["What was one long-term effect of westward expansion on the United States?", ["New territories eventually became new states.", "The nation became smaller.", "Railroads disappeared.", "People stopped farming."], 0],
  ["How were Native Americans and settlers often affected differently by westward expansion?", ["Settlers gained land while many Native Americans lost land.", "Both groups gained equal amounts of land.", "Native Americans controlled most new settlements.", "Settlers were forced onto reservations."], 0],
  ["Which sentence best explains why Manifest Destiny is important in U.S. history?", ["It helps explain why the United States expanded westward and how that expansion affected different groups of people.", "It explains why the United States ended westward travel in the early 1800s.", "It shows how railroads were not useful during expansion.", "It proves that all Americans agreed about expansion."], 0]
];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "block";

  let vocabHTML = "";
  vocab.forEach((item, i) => {
    let defs = shuffle(vocab.map(x => x.def));
    vocabHTML += `
      <div class="match">
        <label>${item.word}</label>
        <select id="v${i}">
          ${defs.map(d => `<option>${d}</option>`).join("")}
        </select>
      </div>
    `;
  });
  document.getElementById("vocab").innerHTML = vocabHTML;

  let questionSet = shuffle([...questions]);
  window.currentQuestions = questionSet;

  let quizHTML = "";
  questionSet.forEach((q, i) => {
    let options = shuffle(q[1].map((text, idx) => ({ text, idx })));
    q.currentOptions = options;

    quizHTML += `
      <div class="question">
        <p>${i + 1}. ${q[0]}</p>
        ${options.map(o => `
          <label>
            <input type="radio" name="q${i}" value="${o.idx}">
            ${o.text}
          </label>
        `).join("")}
      </div>
    `;
  });

  document.getElementById("quiz").innerHTML = quizHTML;
  document.getElementById("results").innerHTML = "";
}

function submitQuiz() {
  let score = 0;

  vocab.forEach((v, i) => {
    let val = document.getElementById(`v${i}`).value;
    if (val === v.def) score++;
  });

  currentQuestions.forEach((q, i) => {
    let ans = document.querySelector(`input[name="q${i}"]:checked`);
    if (ans && parseInt(ans.value) === q[2]) score++;
  });

  let total = 25;
  let name = document.getElementById("name").value.trim();

  let message = "";
  if (score >= 22) message = "Excellent work! You showed a strong understanding of the topic.";
  else if (score >= 18) message = "Nice job! You understood most of the important ideas.";
  else if (score >= 14) message = "You are making progress, but you should review the lesson again.";
  else message = "Keep practicing. Review the notes and try again.";

  document.getElementById("results").innerHTML = `
    <h3>${name || "Student"}'s Score: ${score}/${total}</h3>
    <p>${message}</p>
  `;

  document.getElementById("printName").textContent = name || "________________";
  document.getElementById("printScore").textContent = `${score}/${total}`;
}
</script>

</body>
</html>
