<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
}

/* PAGES */
.page {
  display: none;
  width: 100%;
  min-height: 100vh;
}

#page1 {
  display: block;
  position: relative;
}

/* COVER IMAGE */
.cover {
  width: 100%;
  height: auto;
  display: block;
}

/* INVISIBLE BUTTON */
.start-btn {
  position: absolute;
  bottom: 6%;
  right: 10%;
  width: 320px;
  height: 90px;
  background: transparent;
  border: none;
  cursor: pointer;
}

/* QUIZ BOX */
.box {
  width: 90%;
  max-width: 700px;
  margin: 40px auto;
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 12px;
}

/* BUTTONS */
button {
  padding: 12px 18px;
  border: none;
  background: #8d6e4f;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* QUESTION */
.question {
  margin-bottom: 20px;
}

/* STUDENT INFO */
.student-info {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
  <img src="cover.JPG" class="cover">
  <button class="start-btn" onclick="startQuiz()"></button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="box">

    <div class="student-info">
      <label>Student Name:</label><br>
      <input id="studentName" placeholder="Enter name">
    </div>

    <div id="quiz"></div>

    <button onclick="submitQuiz()">Submit</button>

    <div id="results"></div>

  </div>
</div>

<script>

let questions = [

{q:"What was Manifest Destiny?", a:"Belief U.S. should expand west", b:"Law about taxes", correct:"a"},
{q:"Which ocean did Americans want to reach?", a:"Atlantic", b:"Pacific", correct:"b"},
{q:"Who were pioneers?", a:"People moving west", b:"Government leaders", correct:"a"},
{q:"What was the Oregon Trail?", a:"A road to Canada", b:"A route west", correct:"b"},
{q:"Why did settlers move west?", a:"Land and opportunity", b:"To avoid taxes only", correct:"a"},
{q:"Which group was harmed by expansion?", a:"Native Americans", b:"Factory workers", correct:"a"},
{q:"What was the Louisiana Purchase?", a:"Buying land from France", b:"War with Spain", correct:"a"},
{q:"What did settlers travel in?", a:"Covered wagons", b:"Boats only", correct:"a"},
{q:"What was the Homestead Act?", a:"Free land law", b:"Tax law", correct:"a"},
{q:"Which was a danger on trails?", a:"Disease", b:"Television", correct:"a"},
{q:"What did Manifest Destiny encourage?", a:"Expansion west", b:"Staying east", correct:"a"},
{q:"Who led Lewis and Clark?", a:"Jefferson sent them", b:"Washington sent them", correct:"a"},
{q:"Why was gold important?", a:"People rushed west", b:"It ended expansion", correct:"a"},
{q:"What was the Gold Rush?", a:"Search for gold in CA", b:"A war", correct:"a"},
{q:"Which land was gained after war with Mexico?", a:"Southwest", b:"Canada", correct:"a"},
{q:"What transportation helped expansion later?", a:"Railroads", b:"Airplanes", correct:"a"},
{q:"What happened to Native Americans?", a:"Forced off land", b:"Given land", correct:"a"},
{q:"What belief justified expansion?", a:"Manifest Destiny", b:"Industrialism", correct:"a"},
{q:"Why was land appealing?", a:"Farming and freedom", b:"Only cold weather", correct:"a"},
{q:"What did expansion create?", a:"New states", b:"Less land", correct:"a"}

];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";

  let quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  let shuffled = shuffle(questions);

  shuffled.forEach((q,i)=>{
    quizDiv.innerHTML += `
      <div class="question">
        <p>${i+1}. ${q.q}</p>
        <label><input type="radio" name="q${i}" value="a"> ${q.a}</label><br>
        <label><input type="radio" name="q${i}" value="b"> ${q.b}</label>
      </div>
    `;
  });
}

function submitQuiz(){
  let score = 0;
  let total = questions.length;

  questions.forEach((q,i)=>{
    let answer = document.querySelector(`input[name="q${i}"]:checked`);
    if(answer && answer.value === q.correct){
      score++;
    }
  });

  let name = document.getElementById("studentName").value;

  document.getElementById("results").innerHTML = `
    <h3>${name}'s Score: ${score}/${total}</h3>
    <button onclick="location.reload()">Try Again</button>
    <button onclick="window.print()">Print</button>
  `;
}

</script>

</body>
</html>
