<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
}

.page {
  display: none;
  width: 100%;
  height: 100vh;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

#page1 {
  display: block;
  background-image: url("WWE3.JPG");
}

#page2 {
  background-image: url("WWE1.PNG");
}

#page3 {
  background-image: url("WWE2.PNG");
}

.box {
  width: 60%;
  margin: 100px auto;
  background: rgba(255,255,255,0.85);
  padding: 30px;
  border-radius: 15px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #8d6e4f;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #6f543c;
}

#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="page1" class="page">
  <div class="box" style="text-align:center;">
    <h1>Manifest Destiny Quiz</h1>
    <p>Click below to begin</p>
    <button onclick="nextPage(2)">Start Quiz</button>
  </div>
</div>

<div id="page2" class="page">
  <div class="box">
    <h2>1. What was Manifest Destiny?</h2>

    <label><input type="radio" name="q1" value="a"> Expansion westward</label><br>
    <label><input type="radio" name="q1" value="b"> Trade route</label><br>
    <label><input type="radio" name="q1" value="c"> Railroad company</label><br><br>

    <button onclick="nextPage(3)">Next</button>
  </div>
</div>

<div id="page3" class="page">
  <div class="box">
    <h2>2. What vehicle did settlers use?</h2>

    <label><input type="radio" name="q2" value="a"> Covered wagon</label><br>
    <label><input type="radio" name="q2" value="b"> Boat</label><br>
    <label><input type="radio" name="q2" value="c"> Train</label><br><br>

    <button onclick="showResults()">Submit</button>

    <div id="result"></div>
  </div>
</div>

<script>
function nextPage(pageNumber) {
  document.querySelectorAll(".page").forEach(function(page) {
    page.style.display = "none";
  });
  document.getElementById("page" + pageNumber).style.display = "block";
}

function showResults() {
  let score = 0;

  let q1 = document.querySelector('input[name="q1"]:checked');
  let q2 = document.querySelector('input[name="q2"]:checked');

  if (q1 && q1.value === "a") score++;
  if (q2 && q2.value === "a") score++;

  document.getElementById("result").innerHTML =
    "<h3>Your Score: " + score + "/2</h3>";
}
</script>

</body>
</html>
